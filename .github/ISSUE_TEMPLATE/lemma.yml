name: Lemma or obstruction
description: Propose a proved, conjectural, or failed obstruction lemma
labels: ["LEMMA"]
body:
  - type: textarea
    id: statement
    attributes:
      label: Statement
      description: State the lemma precisely.
    validations:
      required: true
  - type: dropdown
    id: claimtype
    attributes:
      label: Claim type
      options:
        - proved lemma
        - conjecture
        - heuristic
        - failed lemma
    validations:
      required: true
  - type: textarea
    id: proof
    attributes:
      label: Proof, evidence, or failure mode
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Counterexample search / tests run
    validations:
      required: false
