name: Candidate incidence pattern
description: Propose a new directed 4-neighbor incidence pattern
labels: ["INCIDENCE_PATTERN"]
body:
  - type: input
    id: name
    attributes:
      label: Pattern name
      placeholder: B12_3x4_danzer_lift
    validations:
      required: true
  - type: input
    id: n
    attributes:
      label: n
      placeholder: "12"
    validations:
      required: true
  - type: textarea
    id: formula
    attributes:
      label: Formula for S_i
      description: Give a precise formula or full list of selected 4-sets.
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Necessary checks already run
      description: Outdegree 4, no self-loops, pairwise common-selected-neighbor cap, indegree distribution.
    validations:
      required: false
  - type: textarea
    id: rationale
    attributes:
      label: Why this pattern might be geometrically plausible
    validations:
      required: false
  - type: textarea
    id: obstruction
    attributes:
      label: Likely obstruction or known failure mode
    validations:
      required: false
