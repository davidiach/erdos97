name: artifact audit

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/artifact-audit.yml'
      - 'Makefile'
      - 'README.md'
      - 'RESULTS.md'
      - 'STATE.md'
      - 'pyproject.toml'
      - 'pytest.ini'
      - 'requirements-lock.txt'
      - 'certificates/**'
      - 'cpp/**'
      - 'data/**'
      - 'docs/**'
      - 'lean/**'
      - 'metadata/**'
      - 'papers/**'
      - 'reports/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
  pull_request:
    paths:
      - '.github/workflows/artifact-audit.yml'
      - 'Makefile'
      - 'pyproject.toml'
      - 'pytest.ini'
      - 'requirements-lock.txt'
      - 'certificates/**'
      - 'cpp/**'
      - 'data/**'
      - 'metadata/**'
      - 'reports/**'
      - 'scripts/**'
      - 'src/**'
      - 'tests/**'
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * 1'

permissions:
  contents: read

concurrency:
  group: artifact-audit-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  artifact-pytest:
    name: artifact pytest shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: python -m pip install -r requirements-lock.txt
      - run: python -m pip install --no-deps -e .
      - name: Run artifact pytest shard
        run: >-
          python -m pytest -q -m "artifact"
          --shard-count 8 --shard-index ${{ matrix.shard }}

  slow-exhaustive-pytest:
    if: github.event_name != 'pull_request'
    name: non-artifact slow/exhaustive pytest shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: python -m pip install -r requirements-lock.txt
      - run: python -m pip install --no-deps -e .
      - name: Run non-artifact slow/exhaustive pytest shard
        run: >-
          python -m pytest -q -m "(slow or exhaustive) and not artifact"
          --shard-count 8 --shard-index ${{ matrix.shard }}

  artifact-audit:
    if: github.event_name != 'pull_request'
    name: artifact command audit shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements-lock.txt
      - run: python -m pip install -r requirements-lock.txt
      - run: python -m pip install --no-deps -e .
      - name: Run artifact audit
        run: >-
          python scripts/run_artifact_audit.py
          --shard-count 8 --shard-index ${{ matrix.shard }}
          --output-dir artifact-audit-results
      - name: Upload artifact audit summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifact-audit-${{ github.sha }}-shard-${{ matrix.shard }}
          path: artifact-audit-results/
