name: Codex large-blob repair

on:
  push:
    branches: [agent/audit-remediation]
    paths:
      - '.codex-upload/**'

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/audit-remediation
      - name: Verify and restore exact files
        run: |
          cat .codex-upload/parts/* > /tmp/erdos97-large-blob-repair.tar.gz
          echo 'ea6913794defbd319adb42e4a3286770c9584628f0538d90e1f7075991d6c0ba  /tmp/erdos97-large-blob-repair.tar.gz' | sha256sum -c -
          tar -xzf /tmp/erdos97-large-blob-repair.tar.gz
          rm -rf .codex-upload
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'Repair large blobs after connector upload'
          git push origin HEAD:agent/audit-remediation
