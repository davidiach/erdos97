  - id: lean_sketch_integrity
    route_id: lean_guardrails
    command_id: lean_sketch_integrity
    output_format: text
    ledger_gate_ids:
      - lean_compilation
    text_expectations:
      - contains: Lean sketch integrity checks passed

  - id: lean_files
    route_id: lean_guardrails
    command_id: lean_files
    output_format: text
    ledger_gate_ids:
