schema: erdos97.generated_artifacts.v2
claim_scope: >
  Manifest for generated or generator-owned artifacts. This is provenance and
  edit-policy metadata only; it does not prove Erdos Problem #97 and does not
  claim a counterexample.
path_convention: >
  New generated checked artifacts live under data/certificates/. The top-level
  certificates/ directory is legacy/path-stable space for early n=8 artifacts
  and manual templates retained at their historical paths.
required_integrity_fields: >
  Every managed and archived artifact carries sha256 and size_bytes fields.
  scripts/check_artifact_provenance.py verifies current bytes without rerunning
  expensive generators. An archived artifact cited by a source-of-truth surface
  must be promoted to the managed list with claim and replay metadata.
source_of_truth_surfaces:
  - README.md
  - STATE.md
  - RESULTS.md
  - docs/claims.md
  - metadata/erdos97.yaml
archive_digest_schema: erdos97.archived_tracked_artifacts.v1
archive_inventory_sha256: e5c6c933a00628ca84d0632521600edc06ed988eb77ca745c255e53d05b0dc6f

